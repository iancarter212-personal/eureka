plugins {
    id 'com.netflix.nebula.netflixoss' version '11.6.0'
    id 'org.gretty' version '4.1.6'
    id 'com.github.spotbugs' version '6.0.27' apply false
}

idea {
    project {
        languageLevel = '21'
    }
}

if (JavaVersion.current().isJava8Compatible()) {
    allprojects {
        tasks.withType(Javadoc) {
            options.addStringOption('Xdoclint:none', '-quiet')
        }
    }
}

allprojects {
    ext {
        githubProjectName = 'eureka'

        awsVersion = '1.12.782'
        servletVersion = '3.1.0'
        jerseyVersion = '1.19.4'
        jettisonVersion = '1.5.4'
        apacheHttpClientVersion = '4.5.14'
        commonsConfigurationVersion = '1.10'
        jsr305Version = '3.0.2'
        guiceVersion = '5.1.0'
        servoVersion = '0.13.2'
        governatorVersion = '1.17.13'
        archaiusVersion = '0.7.12'
        jacksonVersion = '2.18.3'
        jacksonDatabindVersion = '2.18.3'
        woodstoxVersion = '7.1.0'
        javaxAnnotationVersion = '1.3.2'

        // test deps
        jetty_version = '10.0.24'
        junit_version = '4.13.2'
        mockitoVersion = '5.15.2'
        mockserverVersion = '5.15.0'
    }
}

subprojects {
    apply plugin: 'nebula.netflixoss'
    apply plugin: 'java-library'
    apply plugin: 'jacoco'
    apply plugin: 'com.github.spotbugs'

    group = "com.netflix.${githubProjectName}"

    sourceCompatibility = 21
    targetCompatibility = 21

    repositories {
        mavenCentral()
    }

    test {
        forkEvery = 100
        // setting this property prevents java from grabbing focus when running the tests under osx
        systemProperty 'java.awt.headless', 'true'

        // Java 21 strong encapsulation: open internal modules for reflection-based libraries
        jvmArgs [
            '--add-opens', 'java.base/java.lang=ALL-UNNAMED',
            '--add-opens', 'java.base/java.lang.reflect=ALL-UNNAMED',
            '--add-opens', 'java.base/java.util=ALL-UNNAMED',
            '--add-opens', 'java.base/java.util.concurrent=ALL-UNNAMED',
            '--add-opens', 'java.base/java.net=ALL-UNNAMED',
            '--add-opens', 'java.base/java.io=ALL-UNNAMED',
            '--add-opens', 'java.base/java.math=ALL-UNNAMED',
            '--add-opens', 'java.base/java.text=ALL-UNNAMED',
            '--add-opens', 'java.base/sun.security.ssl=ALL-UNNAMED',
            '--add-opens', 'java.base/sun.net.www.protocol.https=ALL-UNNAMED',
        ]

        finalizedBy jacocoTestReport
    }

    jacocoTestReport {
        dependsOn test
        reports {
            xml.required = true
            html.required = true
        }
    }

    spotbugs {
        ignoreFailures = true
        effort = 'max'
        reportLevel = 'medium'
    }

    spotbugsMain {
        reports {
            html.required = true
            xml.required = true
        }
    }

    spotbugsTest {
        enabled = false
    }

    jar {
        manifest {
            attributes('Build-Time-ISO-8601': java.time.OffsetDateTime.now().format(java.time.format.DateTimeFormatter.ISO_OFFSET_DATE_TIME))
        }
    }

    // Java 21 strong encapsulation: open internal modules for all JavaExec tasks (runtime, examples, etc.)
    tasks.withType(JavaExec).configureEach {
        jvmArgs([
            '--add-opens', 'java.base/java.lang=ALL-UNNAMED',
            '--add-opens', 'java.base/java.lang.reflect=ALL-UNNAMED',
            '--add-opens', 'java.base/java.util=ALL-UNNAMED',
            '--add-opens', 'java.base/java.util.concurrent=ALL-UNNAMED',
            '--add-opens', 'java.base/java.net=ALL-UNNAMED',
            '--add-opens', 'java.base/java.io=ALL-UNNAMED',
            '--add-opens', 'java.base/java.math=ALL-UNNAMED',
            '--add-opens', 'java.base/java.text=ALL-UNNAMED',
            '--add-opens', 'java.base/sun.security.ssl=ALL-UNNAMED',
            '--add-opens', 'java.base/sun.net.www.protocol.https=ALL-UNNAMED',
        ])
    }
}
