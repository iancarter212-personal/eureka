name: "Nightly Slow Tests"
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  slow-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 21 ]
    name: Slow Tests with Java ${{ matrix.java }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'zulu'
      - uses: actions/cache@v5
        id: gradle-cache
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - uses: actions/cache@v5
        id: gradle-wrapper-cache
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradlewrapper-${{ hashFiles('gradle/wrapper/*') }}
          restore-keys: |
            ${{ runner.os }}-gradlewrapper-
      - name: Run slow tests
        run: ./gradlew --stacktrace test -Dinclude.slow.tests=true
        env:
          CI_NAME: github_actions
          CI_BUILD_NUMBER: ${{ github.sha }}
          CI_BUILD_URL: 'https://github.com/${{ github.repository }}'
          CI_BRANCH: ${{ github.ref }}
